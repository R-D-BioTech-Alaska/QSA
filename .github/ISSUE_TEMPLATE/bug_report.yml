name: Bug report
description: Report a reproducible QSA defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report undisclosed security vulnerabilities here. Use the Security tab.
  - type: input
    id: version
    attributes:
      label: QSA version
      placeholder: 0.1.6
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Interface
      options:
        - C++
        - C ABI
        - Python qsa
        - Python qubit_native
        - QSC
        - Build or packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest code and exact commands that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake, Python, CPU/GPU, and build flags.
    validations:
      required: true
