name: Feature request
description: Propose an additive QSA capability
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workload
      description: Describe the state structure or workflow this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Explain how C++, C, Python, QSC v1, and existing projects remain compatible.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation or benchmark plan
